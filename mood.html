<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Mood — RDecants</title>
<meta name="description" content="Colecciones curadas de fragancias por mood: calor tropical, noche, oficina, lujo y más.">
<meta name="theme-color" content="#030303">

<meta property="og:title"       content="RDecants — Mood">
<meta property="og:description" content="Colecciones curadas de fragancias por estilo de vida.">
<meta property="og:type"        content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/assets/css/components.css?v=1.0.28">
<link rel="stylesheet" href="/assets/css/styles.css?v=1.0.2">
</head>

<body class="mood-body">

<header class="header">
  <a href="/" class="header-logo">
    <span class="logo-text">R<span>D</span>ECANTS</span>
  </a>
  <nav class="header-actions">
    <button class="btn-cart" onclick="toggleCart()" aria-label="Abrir carrito">
      <span class="cart-dot" id="cart-dot"></span>
      CARRITO (<span id="cart-count">0</span>)
    </button>
  </nav>
</header>

<main id="mood-root" class="mood-root">
  <p class="catalog-loading" style="text-align:center;padding:80px 16px;">Cargando colección...</p>
</main>

<footer class="footer">
  <div class="container">
    <p class="footer-logo">R DECANTS</p>
    <p class="footer-tag">© 2026 — Fragancias auténticas en decants premium.</p>
  </div>
</footer>

<div id="cart-overlay" class="cart-overlay" onclick="closeCart()"></div>

<aside id="cart-drawer" class="cart-drawer" role="dialog" aria-modal="true" aria-hidden="true" aria-label="Carrito de compras">
  <div class="cart-header">
    <h2 class="cart-title">Tu Colección</h2>
    <button class="cart-close" onclick="closeCart()" aria-label="Cerrar carrito">×</button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer">
    <div class="checkout-panel" id="checkout-form" aria-label="Datos de checkout">
      <div class="checkout-head">
        <span class="checkout-kicker">Datos rápidos del pedido</span>
        <span class="checkout-note">Al finalizar, apartamos tu pedido y te llevamos a WhatsApp para confirmar pago y entrega.</span>
      </div>
      <p class="checkout-momentum" id="checkout-momentum" aria-live="polite" hidden></p>
      <div class="checkout-grid">
        <label class="checkout-control" for="checkout-name">
          <span>Nombre para tu pedido *</span>
          <input class="checkout-field" id="checkout-name" type="text" autocomplete="name" placeholder="Ej. Roger Díaz" aria-required="true">
          <small class="checkout-helper">Usaremos este nombre para identificar tu pedido.</small>
        </label>
        <label class="checkout-control" for="checkout-phone">
          <span>Telefono</span>
          <input class="checkout-field" id="checkout-phone" type="tel" autocomplete="tel" inputmode="tel" placeholder="951...">
        </label>
      </div>
      <label class="checkout-label" for="checkout-notes">Notas opcionales</label>
      <textarea class="checkout-field checkout-textarea" id="checkout-notes" rows="3" placeholder="Horario, referencia o detalle especial"></textarea>
      <p class="checkout-error" id="checkout-error" aria-live="polite"></p>
    </div>
    <div class="cart-action-panel">
      <div class="cart-summary" aria-label="Resumen del pedido">
        <div class="cart-summary-head">
          <span class="cart-summary-title">Resumen</span>
          <span class="cart-summary-count" id="cart-summary-count">0 artículos</span>
        </div>
        <div class="cart-summary-line">
          <span>Subtotal</span>
          <span id="cart-subtotal">$0 MXN</span>
        </div>
        <div class="cart-total-row">
          <span class="cart-total-label">Total</span>
          <span class="cart-total-amount">$<span id="cart-total">0</span> <small>MXN</small></span>
        </div>
      </div>
      <button class="btn-whatsapp" id="checkout-whatsapp" onclick="sendWhatsApp()" aria-label="Finalizar pedido por WhatsApp">
        Finalizar por WhatsApp
      </button>
      <button class="btn-continue" onclick="closeCart()" aria-label="Cerrar carrito y seguir explorando">
        Seguir comprando
      </button>
    </div>
  </div>
</aside>
