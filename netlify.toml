[build]
  publish = "."

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# ── HTML — never cache, always fresh (solves "old version on phone") ──────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma        = "no-cache"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma        = "no-cache"

# ── JS — ETag revalidation (no download if unchanged, solves stale cache) ─────
[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "no-cache"

# ── Data — always fresh ───────────────────────────────────────────────────────
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ── CSS — long cache; invalidated via ?v=VERSION query string in HTML ─────────
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Images — immutable (filenames include content hash or never change) ───────
[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Redirects — SPA-safe (not needed for MPA but future-proof) ───────────────
[[redirects]]
  from   = "/404"
  to     = "/index.html"
  status = 404
